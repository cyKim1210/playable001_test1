<script>
    // Google Ads: Ensure audio is muted until first user interaction
    (function() {
        var _origAudioContext = window.AudioContext || window.webkitAudioContext;
        if (_origAudioContext) {
            var _origResume = _origAudioContext.prototype.resume;
            var _userInteracted = false;
            document.addEventListener('click', function() { _userInteracted = true; }, { once: true });
            document.addEventListener('touchstart', function() { _userInteracted = true; }, { once: true });
            _origAudioContext.prototype.resume = function() {
                if (!_userInteracted) return Promise.resolve();
                return _origResume.call(this);
            };
        }
    })();
</script>
